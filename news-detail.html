<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お知らせ詳細</title>
  <!--
    【実装例】公開サイト向けお知らせ詳細ページ
    URLパラメータ ?id=xxx で記事を特定します。
    デザインは各プロジェクトに合わせて自由に変更してください。
    データ取得のロジックはそのまま流用できます。
  -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- 戻るリンク -->
  <div>
    <a href="news.html">← お知らせ一覧に戻る</a>
  </div>

  <!-- 記事コンテンツの挿入先 -->
  <article id="newsDetail"></article>

  <script src="js/supabase-config.js"></script>
  <script>
    // ============================================================
    // データ取得（変更不要）
    // ============================================================

    async function fetchNewsById(id) {
      const { data, error } = await db
        .from('news')
        .select('*')
        .eq('id', id)
        .eq('is_published', true)
        .single()

      if (error) return null
      return data
    }

    // ============================================================
    // 描画（デザインはここを変更する）
    // ============================================================

    function renderDetail(news) {
      const el = document.getElementById('newsDetail')
      const date = news.published_at
        ? new Date(news.published_at).toLocaleDateString('ja-JP')
        : ''

      el.innerHTML = `
        ${news.thumbnail_url ? `<img src="${news.thumbnail_url}" alt="${news.title}" />` : ''}
        <p>${date}</p>
        ${news.category ? `<span>[${news.category}]</span>` : ''}
        <h1>${news.title}</h1>
        <div>${news.body ?? ''}</div>
      `
    }

    function renderNotFound() {
      document.getElementById('newsDetail').innerHTML = '<p>記事が見つかりません。</p>'
    }

    // ============================================================
    // 初期ロード
    // ============================================================

    async function init() {
      const id = new URLSearchParams(location.search).get('id')
      if (!id) { renderNotFound(); return }

      const news = await fetchNewsById(id)
      if (!news) { renderNotFound(); return }

      // ページタイトルを記事タイトルに更新
      document.title = news.title

      renderDetail(news)
    }

    init()
  </script>

</body>
</html>
