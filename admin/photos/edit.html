<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フォト編集</title>
  <link rel="stylesheet" href="../admin.css?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="layout">
    <div id="sidebar"></div>
    <main class="layout-main">
      <div class="page-wrapper">
        <a href="index.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          一覧に戻る
        </a>
        <h1 class="page-title" style="margin:12px 0 20px;">フォト編集</h1>

        <div class="form-card">
          <form id="photoForm">
            <input type="hidden" id="existing_image_url" />

            <div class="photo-form-layout">

              <!-- 左：ドロップゾーン -->
              <div class="photo-form-left">
                <label class="form-label">写真</label>
                <div id="dropzone" class="photo-dropzone" onclick="document.getElementById('image').click()">
                  <img id="preview" src="" alt="プレビュー" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:10px;" />
                  <div id="dropzonePlaceholder">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#94a3b8; margin-bottom:10px;"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <p style="font-size:13px; color:#64748b; font-weight:500;">クリックして写真を変更</p>
                    <p style="font-size:12px; color:#94a3b8; margin-top:4px;">選択しない場合は現在の写真を維持</p>
                  </div>
                </div>
                <input id="image" type="file" accept="image/*" />
              </div>

              <!-- 右：フィールド群 -->
              <div class="photo-form-right">
                <div class="form-group">
                  <label for="title" class="form-label">タイトル</label>
                  <input id="title" type="text" class="form-input" placeholder="写真のタイトル（省略可）" />
                </div>

                <div class="form-group">
                  <label for="description" class="form-label">説明</label>
                  <textarea id="description" class="form-textarea" placeholder="写真の説明（省略可）" style="min-height:120px;"></textarea>
                </div>

                <div class="form-group">
                  <label for="sort_order" class="form-label">表示順</label>
                  <input id="sort_order" type="number" class="form-input" min="0" style="max-width:120px;" />
                  <p class="form-hint">数字が小さいほど上に表示されます</p>
                </div>

                <div class="form-group">
                  <label class="checkbox-label">
                    <span class="toggle">
                      <input id="is_published" type="checkbox" />
                      <span class="toggle-track"></span>
                      <span class="toggle-thumb"></span>
                    </span>
                    公開する
                  </label>
                </div>

                <div class="form-actions">
                  <button type="submit" id="submitBtn" class="btn btn-primary">保存する</button>
                  <a href="index.html" class="btn btn-ghost">キャンセル</a>
                </div>
              </div>

            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/supabase-config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../nav.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get('id')

    async function init() {
      await requireAuth()
      if (!id) { window.location.href = 'index.html'; return }

      const { data, error } = await db.from('photos').select('*').eq('id', id).single()
      if (error || !data) { alert('データの取得に失敗しました'); return }

      document.getElementById('title').value       = data.title ?? ''
      document.getElementById('description').value = data.description ?? ''
      document.getElementById('sort_order').value  = data.sort_order ?? 0
      document.getElementById('is_published').checked = data.is_published
      document.getElementById('existing_image_url').value = data.image_url ?? ''

      if (data.image_url) {
        const preview = document.getElementById('preview')
        preview.src = data.image_url
        preview.style.display = 'block'
        document.getElementById('dropzonePlaceholder').style.display = 'none'
      }
    }

    document.getElementById('image').addEventListener('change', (e) => {
      const file = e.target.files[0]
      if (!file) return
      const preview = document.getElementById('preview')
      preview.src = URL.createObjectURL(file)
      preview.style.display = 'block'
      document.getElementById('dropzonePlaceholder').style.display = 'none'
    })

    document.getElementById('photoForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('submitBtn')
      btn.disabled = true; btn.textContent = '保存中...'

      const title        = document.getElementById('title').value || null
      const description  = document.getElementById('description').value || null
      const sort_order   = parseInt(document.getElementById('sort_order').value) || 0
      const is_published = document.getElementById('is_published').checked
      const imageFile    = document.getElementById('image').files[0]
      let image_url      = document.getElementById('existing_image_url').value || null

      if (imageFile) {
        const ext  = imageFile.name.split('.').pop()
        const path = `${Date.now()}.${ext}`
        const { data: uploadData, error: uploadError } = await db.storage
          .from('photos')
          .upload(path, imageFile)
        if (uploadError) {
          alert('画像のアップロードに失敗しました')
          btn.disabled = false; btn.textContent = '保存する'
          return
        }
        const { data: { publicUrl } } = db.storage.from('photos').getPublicUrl(uploadData.path)
        image_url = publicUrl
      }

      const { error } = await db.from('photos').update({
        title, description, sort_order, is_published, image_url
      }).eq('id', id)

      if (error) {
        alert('保存に失敗しました')
        btn.disabled = false; btn.textContent = '保存する'
        return
      }
      window.location.href = 'index.html'
    })

    init()
  </script>
</body>
</html>
