<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フォト管理</title>
  <link rel="stylesheet" href="../admin.css?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="layout">
    <div id="sidebar"></div>
    <main class="layout-main">
      <div class="page-wrapper">
        <div class="page-top">
          <h1 class="page-title">フォト管理</h1>
          <a href="new.html" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            追加
          </a>
        </div>

        <div id="photoGrid" class="photo-grid"></div>
      </div>
    </main>
  </div>

  <script src="../../js/supabase-config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../nav.js"></script>
  <script>
    async function init() {
      await requireAuth()

      const { data, error } = await db
        .from('photos')
        .select('*')
        .order('sort_order', { ascending: true })
        .order('created_at', { ascending: false })

      if (error) { alert('データの取得に失敗しました'); return }

      const grid = document.getElementById('photoGrid')

      if (!data.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">フォトがまだありません</div>`
        return
      }

      grid.innerHTML = data.map(photo => `
        <div class="photo-card">
          ${photo.image_url
            ? `<img class="photo-card-img" src="${escHtml(photo.image_url)}" alt="${escHtml(photo.title ?? '')}" loading="lazy" />`
            : `<div class="photo-card-img-placeholder">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
               </div>`
          }
          <div class="photo-card-body">
            <p class="photo-card-title">${photo.title ? escHtml(photo.title) : ''}</p>
            <div class="photo-card-footer">
              <span class="badge ${photo.is_published ? 'badge-published' : 'badge-draft'}">
                ${photo.is_published ? '公開中' : '非公開'}
              </span>
              <div class="photo-card-actions">
                <a href="edit.html?id=${photo.id}" class="link-edit">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  編集
                </a>
                <button onclick="deletePhoto('${photo.id}')" class="btn btn-danger">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                  削除
                </button>
              </div>
            </div>
          </div>
        </div>
      `).join('')
    }

    async function deletePhoto(id) {
      if (!confirm('この写真を削除しますか？')) return
      const { error } = await db.from('photos').delete().eq('id', id)
      if (error) { alert('削除に失敗しました'); return }
      init()
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    init()
  </script>
</body>
</html>
