<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お知らせ編集</title>
  <link rel="stylesheet" href="../admin.css?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="layout">
    <div id="sidebar"></div>
    <main class="layout-main">
      <div class="page-wrapper-narrow">
        <a href="index.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          一覧に戻る
        </a>
        <h1 class="page-title" style="margin:12px 0 20px;">お知らせ編集</h1>

        <div class="form-card">
          <form id="newsForm">
            <input type="hidden" id="existing_thumbnail_url" />
            <div class="form-group">
              <label for="title" class="form-label">タイトル <span class="required">*</span></label>
              <input id="title" type="text" class="form-input" required />
            </div>
            <div class="form-group">
              <label for="category" class="form-label">カテゴリ</label>
              <input id="category" type="text" class="form-input" />
            </div>
            <div class="form-group">
              <label for="content" class="form-label">本文 <span class="required">*</span></label>
              <textarea id="content" class="form-textarea" required></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">サムネイル画像</label>
              <img id="thumbnailPreview" class="thumbnail-preview" src="" alt="サムネイル" style="display:none;" />
              <label for="thumbnail" class="file-input-label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                画像を変更
              </label>
              <input id="thumbnail" type="file" accept="image/*" />
              <p id="thumbnailHint" class="form-hint" style="display:none;">新しい画像を選択すると上書きされます</p>
            </div>
            <div class="form-group">
              <label class="checkbox-label">
                <span class="toggle">
                  <input id="is_published" type="checkbox" />
                  <span class="toggle-track"></span>
                  <span class="toggle-thumb"></span>
                </span>
                公開する
              </label>
            </div>
            <div class="form-actions">
              <button type="submit" id="submitBtn" class="btn btn-primary">保存する</button>
              <a href="index.html" class="btn btn-ghost">キャンセル</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../../js/supabase-config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../nav.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get('id')
    let originalData = null

    async function init() {
      await requireAuth()
      if (!id) { window.location.href = 'index.html'; return }

      const { data, error } = await db.from('news').select('*').eq('id', id).single()
      if (error || !data) { alert('データの取得に失敗しました'); return }

      originalData = data
      document.getElementById('title').value                  = data.title
      document.getElementById('content').value                = data.content
      document.getElementById('category').value               = data.category ?? ''
      document.getElementById('is_published').checked         = data.is_published
      document.getElementById('existing_thumbnail_url').value = data.thumbnail_url ?? ''

      if (data.thumbnail_url) {
        const preview = document.getElementById('thumbnailPreview')
        preview.src = data.thumbnail_url
        preview.style.display = 'block'
        document.getElementById('thumbnailHint').style.display = 'block'
      }
    }

    document.getElementById('thumbnail').addEventListener('change', (e) => {
      const file = e.target.files[0]
      if (!file) return
      const preview = document.getElementById('thumbnailPreview')
      preview.src = URL.createObjectURL(file)
      preview.style.display = 'block'
      document.getElementById('thumbnailHint').style.display = 'block'
    })

    document.getElementById('newsForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('submitBtn')
      btn.disabled = true; btn.textContent = '保存中...'

      const title        = document.getElementById('title').value
      const content      = document.getElementById('content').value
      const category     = document.getElementById('category').value || null
      const is_published = document.getElementById('is_published').checked
      const imageFile    = document.getElementById('thumbnail').files[0]
      let thumbnail_url  = document.getElementById('existing_thumbnail_url').value || null

      if (imageFile) {
        const ext  = imageFile.name.split('.').pop()
        const path = `${Date.now()}.${ext}`
        const { data: uploadData, error: uploadError } = await db.storage.from('news-images').upload(path, imageFile)
        if (uploadError) { alert('画像のアップロードに失敗しました'); btn.disabled = false; btn.textContent = '保存する'; return }
        const { data: { publicUrl } } = db.storage.from('news-images').getPublicUrl(uploadData.path)
        thumbnail_url = publicUrl
      }

      const published_at = is_published && !originalData.is_published
        ? new Date().toISOString()
        : originalData.published_at

      const { error } = await db.from('news').update({
        title, content, category, thumbnail_url, is_published, published_at
      }).eq('id', id)

      if (error) { alert('保存に失敗しました'); btn.disabled = false; btn.textContent = '保存する'; return }
      window.location.href = 'index.html'
    })

    init()
  </script>
</body>
</html>
