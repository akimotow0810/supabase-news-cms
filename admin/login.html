<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者ログイン</title>
  <link rel="stylesheet" href="admin.css?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </div>
      <p class="login-title">管理画面</p>
      <p class="login-subtitle">メールアドレスとパスワードでログイン</p>
    </div>

    <p id="errorMsg" class="error-msg"></p>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="email" class="form-label">メールアドレス</label>
        <input id="email" type="email" class="form-input" placeholder="admin@example.com" required />
      </div>
      <div class="form-group">
        <label for="password" class="form-label">パスワード</label>
        <input id="password" type="password" class="form-input" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-login">ログイン</button>
    </form>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script>
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'news/'
    })

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email    = document.getElementById('email').value
      const password = document.getElementById('password').value
      const errorMsg = document.getElementById('errorMsg')
      const btn      = e.submitter
      btn.disabled   = true
      btn.textContent = 'ログイン中...'

      const { error } = await db.auth.signInWithPassword({ email, password })
      if (error) {
        errorMsg.textContent = 'メールアドレスまたはパスワードが正しくありません'
        errorMsg.style.display = 'block'
        btn.disabled    = false
        btn.textContent = 'ログイン'
        return
      }
      window.location.href = 'news/'
    })
  </script>

</body>
</html>
