<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お知らせ編集</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-bottom:1px solid #e5e7eb;">
    <strong>管理画面</strong>
    <button onclick="logout()">ログアウト</button>
  </header>

  <main style="padding:24px; max-width:720px;">
    <h1>お知らせ編集</h1>

    <form id="newsForm">
      <input type="hidden" id="existing_thumbnail_url" />

      <div style="margin-bottom:20px;">
        <label for="title" style="display:block; font-weight:bold; margin-bottom:4px;">タイトル *</label>
        <input id="title" type="text" required style="display:block; width:100%; padding:8px;" />
      </div>

      <div style="margin-bottom:20px;">
        <label for="category" style="display:block; font-weight:bold; margin-bottom:4px;">カテゴリ</label>
        <input id="category" type="text" style="display:block; width:100%; padding:8px;" />
      </div>

      <div style="margin-bottom:20px;">
        <label for="content" style="display:block; font-weight:bold; margin-bottom:4px;">本文 *</label>
        <textarea id="content" rows="12" required style="display:block; width:100%; padding:8px;"></textarea>
      </div>

      <div style="margin-bottom:20px;">
        <label for="thumbnail" style="display:block; font-weight:bold; margin-bottom:4px;">サムネイル画像</label>
        <div id="currentThumbnail"></div>
        <input id="thumbnail" type="file" accept="image/*" />
      </div>

      <div style="margin-bottom:24px;">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input id="is_published" type="checkbox" />
          公開する
        </label>
      </div>

      <div style="display:flex; gap:12px;">
        <button type="submit">保存する</button>
        <a href="index.html">キャンセル</a>
      </div>
    </form>
  </main>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // URLクエリパラメータから id を取得
    const id = new URLSearchParams(location.search).get('id')
    let originalData = null

    async function init() {
      await requireAuth()
      if (!id) { window.location.href = 'index.html'; return }

      const { data, error } = await db.from('news').select('*').eq('id', id).single()
      if (error || !data) { alert('データの取得に失敗しました'); return }

      originalData = data
      document.getElementById('title').value        = data.title
      document.getElementById('content').value      = data.content
      document.getElementById('category').value     = data.category ?? ''
      document.getElementById('is_published').checked = data.is_published
      document.getElementById('existing_thumbnail_url').value = data.thumbnail_url ?? ''

      if (data.thumbnail_url) {
        document.getElementById('currentThumbnail').innerHTML = `
          <img src="${data.thumbnail_url}" alt="現在のサムネイル" style="max-width:200px; display:block; margin-bottom:4px;">
          <small style="color:#6b7280;">新しい画像を選択すると上書きされます</small>
        `
      }
    }

    document.getElementById('newsForm').addEventListener('submit', async (e) => {
      e.preventDefault()

      const title        = document.getElementById('title').value
      const content      = document.getElementById('content').value
      const category     = document.getElementById('category').value || null
      const is_published = document.getElementById('is_published').checked
      const imageFile    = document.getElementById('thumbnail').files[0]
      let thumbnail_url  = document.getElementById('existing_thumbnail_url').value || null

      if (imageFile) {
        const ext  = imageFile.name.split('.').pop()
        const path = `${Date.now()}.${ext}`
        const { data: uploadData, error: uploadError } = await db.storage
          .from('news-images')
          .upload(path, imageFile)
        if (uploadError) { alert('画像のアップロードに失敗しました'); return }
        const { data: { publicUrl } } = db.storage.from('news-images').getPublicUrl(uploadData.path)
        thumbnail_url = publicUrl
      }

      // 初回公開時のみ published_at をセット
      const published_at = is_published && !originalData.is_published
        ? new Date().toISOString()
        : originalData.published_at

      const { error } = await db.from('news').update({
        title, content, category, thumbnail_url, is_published, published_at
      }).eq('id', id)

      if (error) { alert('保存に失敗しました'); return }
      window.location.href = 'index.html'
    })

    init()
  </script>

</body>
</html>
